  // ── PLANT DOKTER ──────────────────────────────────────────────────────────────
  function PlantDokterScreen() {
    var [selectedPlant, setSelectedPlant] = React.useState(null);
    var [beschrijving, setBeschrijving]   = React.useState("");
    var [foto, setFoto]                   = React.useState(null);
    var [fotoBase64, setFotoBase64]       = React.useState(null);
    var [loading, setLoading]             = React.useState(false);
    var [diagnose, setDiagnose]           = React.useState(null);
    var [history, setHistory]             = React.useState([]);

    function handleFoto(e) {
      var file = e.target.files[0];
      if (!file) return;
      setFoto(file.name);
      var reader = new FileReader();
      reader.onload = function(ev) {
        setFotoBase64(ev.target.result.split(",")[1]);
      };
      reader.readAsDataURL(file);
    }

    function resetForm() {
      setBeschrijving(""); setFoto(null); setFotoBase64(null);
      setDiagnose(null); setSelectedPlant(null);
    }

    async function diagnoserenAI() {
      if (!beschrijving && !fotoBase64) return;
      setLoading(true);
      setDiagnose(null);

      var plantNaam = selectedPlant ? selectedPlant.shortName + " (" + selectedPlant.name + ")" : "onbekende plant";
      var dbInfo = selectedPlant && selectedPlant.dbId
        ? PLANT_DB.find(function(d){ return d.id===selectedPlant.dbId; })
        : null;

      var contextText = "Je bent een expert plantendokter. Diagnosticeer het plantenprobleem nauwkeurig.";
      if (dbInfo) {
        contextText += " Plant: " + plantNaam + ". Bekende ziektes: " + (dbInfo.diseases||"onbekend") + ". Bekende plagen: " + (dbInfo.pests||"onbekend") + ".";
      }
      contextText += " Geef je antwoord in het Nederlands. Structureer als: 1) Waarschijnlijke diagnose, 2) Oorzaak, 3) Behandeling, 4) Preventie.";

      var messages = [];
      if (fotoBase64) {
        var userContent = [
          { type:"image", source:{ type:"base64", media_type:"image/jpeg", data:fotoBase64 } }
        ];
        if (beschrijving) {
          userContent.push({ type:"text", text:"Plant: " + plantNaam + ". Probleem: " + beschrijving });
        } else {
          userContent.push({ type:"text", text:"Plant: " + plantNaam + ". Wat is er mis met deze plant?" });
        }
        messages.push({ role:"user", content:userContent });
      } else {
        messages.push({ role:"user", content:"Plant: " + plantNaam + ". Probleem: " + beschrijving });
      }

      try {
        var response = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({
            model:"claude-sonnet-4-6",
            max_tokens:1000,
            system: contextText,
            messages: messages
          })
        });
        var data = await response.json();
        var tekst = data.content && data.content[0] ? data.content[0].text : "Geen diagnose beschikbaar.";
        setDiagnose(tekst);
        var entry = {
          id: Date.now(),
          datum: new Date().toLocaleDateString("nl-NL", {day:"numeric",month:"short"}),
          plant: plantNaam,
          beschrijving: beschrijving || "Foto geüpload",
          diagnose: tekst,
          foto: !!fotoBase64
        };
        setHistory(function(prev){ return [entry].concat(prev).slice(0,10); });
      } catch(err) {
        setDiagnose("Fout bij verbinding. Controleer internetverbinding en probeer opnieuw.");
      }
      setLoading(false);
    }

    return (
      <div style={{maxWidth:680,margin:"0 auto",padding:"20px 16px 100px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
          <div style={{width:42,height:42,borderRadius:13,background:"linear-gradient(135deg,#2D8A4A,#40C060)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🩺</div>
          <div>
            <h1 style={{fontSize:24,fontWeight:900,color:T.text,margin:0,lineHeight:1}}>Plant Dokter</h1>
            <p style={{fontSize:12,color:T.textMuted,margin:"2px 0 0"}}>AI-diagnose op basis van beschrijving of foto</p>
          </div>
        </div>

        {!diagnose && (
          <div style={{background:T.surface,borderRadius:18,padding:"18px 16px",marginTop:16,boxShadow:T.shadow}}>

            <p style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px"}}>Welke plant? (optioneel)</p>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:16}}>
              {myPlants.map(function(p){
                var isA = selectedPlant && selectedPlant.id===p.id;
                return (
                  <button key={p.id} onClick={function(){ setSelectedPlant(isA?null:p); }}
                    style={{padding:"7px 14px",borderRadius:999,border:"2px solid "+(isA?p.accentColor:T.border),background:isA?p.accentColor:T.bg,color:isA?"#fff":T.textMid,fontFamily:T.sans,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                    {p.shortName}
                  </button>
                );
              })}
              <button onClick={function(){ setSelectedPlant(null); }}
                style={{padding:"7px 14px",borderRadius:999,border:"2px solid "+T.border,background:"transparent",color:T.textMuted,fontFamily:T.sans,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                Andere plant
              </button>
            </div>

            <p style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px"}}>Beschrijf het probleem</p>
            <textarea
              value={beschrijving}
              onChange={function(e){ setBeschrijving(e.target.value); }}
              placeholder={"Bijv: gele bladeren met bruine vlekken, slappe stengel, witte poederlaag op blad, insecten aanwezig..."}
              style={{width:"100%",background:T.bg,border:"2px solid "+T.border,borderRadius:12,color:T.text,fontFamily:T.sans,fontSize:13,padding:"12px 14px",resize:"vertical",minHeight:90,outline:"none",boxSizing:"border-box",lineHeight:1.6,marginBottom:14}}
            />

            <p style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px"}}>Foto toevoegen (optioneel)</p>
            <label style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderRadius:12,border:"2px dashed "+T.border,background:T.bg,cursor:"pointer",marginBottom:18}}>
              <span style={{fontSize:22}}>📷</span>
              <div>
                <p style={{fontSize:13,fontWeight:700,color:T.text,margin:0}}>{foto ? foto : "Tik om foto te kiezen"}</p>
                <p style={{fontSize:11,color:T.textMuted,margin:"2px 0 0"}}>{foto ? "Foto geselecteerd" : "JPG of PNG van de zieke plant"}</p>
              </div>
              <input type="file" accept="image/*" onChange={handleFoto} style={{display:"none"}}/>
            </label>

            <button
              onClick={diagnoserenAI}
              disabled={loading || (!beschrijving && !fotoBase64)}
              style={{width:"100%",padding:"14px",borderRadius:14,background:(!beschrijving&&!fotoBase64)||loading?"#ccc":"linear-gradient(135deg,#2D8A4A,#40C060)",border:"none",color:"#fff",fontFamily:T.sans,fontWeight:900,fontSize:15,cursor:(!beschrijving&&!fotoBase64)||loading?"not-allowed":"pointer",boxShadow:(!beschrijving&&!fotoBase64)||loading?"none":"0 4px 16px rgba(40,140,70,0.35)"}}>
              {loading ? "Bezig met analyseren..." : "Diagnose stellen 🩺"}
            </button>

            {loading && (
              <div style={{marginTop:16,textAlign:"center"}}>
                <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",gap:8}}>
                  <div style={{width:36,height:36,border:"3px solid "+T.border,borderTop:"3px solid #2D8A4A",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
                  <p style={{fontSize:12,color:T.textMuted,margin:0}}>AI analyseert jouw plant...</p>
                </div>
                <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
              </div>
            )}
          </div>
        )}

        {diagnose && (
          <div style={{marginTop:16}}>
            <div style={{background:"linear-gradient(135deg,#2D8A4A,#40C060)",borderRadius:18,padding:"14px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:24}}>🩺</span>
              <div>
                <p style={{fontSize:14,fontWeight:900,color:"#fff",margin:0}}>Diagnose gereed</p>
                <p style={{fontSize:11,color:"rgba(255,255,255,0.75)",margin:"2px 0 0"}}>{selectedPlant?selectedPlant.shortName:"Plant"} - {new Date().toLocaleDateString("nl-NL",{day:"numeric",month:"long"})}</p>
              </div>
            </div>

            <div style={{background:T.surface,borderRadius:18,padding:"18px 16px",boxShadow:T.shadow,marginBottom:14}}>
              <p style={{fontSize:13,color:T.text,lineHeight:1.8,margin:0,whiteSpace:"pre-wrap"}}>{diagnose}</p>
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={resetForm} style={{flex:1,padding:"12px",borderRadius:13,background:T.greenLight,border:"2px solid "+T.green+"40",color:T.green,fontFamily:T.sans,fontWeight:800,fontSize:13,cursor:"pointer"}}>
                Nieuwe diagnose
              </button>
              <button onClick={function(){ setBeschrijving(""); setFoto(null); setFotoBase64(null); setDiagnose(null); }}
                style={{flex:1,padding:"12px",borderRadius:13,background:T.surface,border:"2px solid "+T.border,color:T.textMid,fontFamily:T.sans,fontWeight:800,fontSize:13,cursor:"pointer"}}>
                Aanpassen
              </button>
            </div>
          </div>
        )}

        {history.length > 0 && !diagnose && (
          <div style={{marginTop:24}}>
            <p style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,margin:"0 0 10px"}}>Eerdere diagnoses</p>
            {history.map(function(h){
              return (
                <div key={h.id} style={{background:T.surface,borderRadius:14,padding:"12px 14px",marginBottom:10,boxShadow:T.shadow}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div>
                      <p style={{fontSize:13,fontWeight:800,color:T.text,margin:0}}>{h.plant}</p>
                      <p style={{fontSize:11,color:T.textMuted,margin:"2px 0 0"}}>{h.datum} {h.foto?"· 📷 foto":""}</p>
                    </div>
                  </div>
                  <p style={{fontSize:11,color:T.textMid,margin:"4px 0 8px",fontStyle:"italic"}}>{h.beschrijving}</p>
                  <p style={{fontSize:12,color:T.text,lineHeight:1.6,margin:0}}>{h.diagnose.substring(0,200)}{h.diagnose.length>200?"...":""}</p>
                  {h.diagnose.length>200 && (
                    <button onClick={function(){ setDiagnose(h.diagnose); setSelectedPlant(null); }}
                      style={{marginTop:6,background:"none",border:"none",color:T.green,fontFamily:T.sans,fontWeight:700,fontSize:12,cursor:"pointer",padding:0}}>
                      Volledige diagnose lezen →
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }


  // ── ONBOARDING ────────────────────────────────────────────────────────────────
  function OnboardingScreen() {
    var [naam, setNaam]   = React.useState("");
    var [stad, setStad]   = React.useState("");
    var [stap, setStap]   = React.useState(1);

    function opslaan() {
      if (!naam.trim()) return;
      var trimNaam = naam.trim();
      var trimStad = stad.trim();
      setUserName(trimNaam);
      setUserCity(trimStad);
      setOnboardingDone(true);
      setStore(function(prev) {
        var n = Object.assign({}, prev);
        n.__userName = trimNaam;
        n.__userCity = trimStad;
        n.__onboardingDone = true;
        saveStore(n);
        return n;
      });
    }

    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,"+T.green+" 0%,"+T.greenMid+" 40%,"+T.bg+" 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"30px 24px",fontFamily:T.sans}}>

        <div style={{width:72,height:72,borderRadius:22,background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:20,boxShadow:"0 8px 32px rgba(0,0,0,0.15)"}}>
          <svg width="38" height="38" viewBox="0 0 48 48" fill="none">
            <path d="M24 44C24 44 22 30 22 22" stroke="white" strokeWidth="3" strokeLinecap="round"/>
            <path d="M22 22C22 22 10 18 6 10C6 10 14 10 20 18" fill="white" opacity="0.9"/>
            <path d="M22 22C22 22 28 12 38 10C38 10 36 20 24 24" fill="white" opacity="0.9"/>
            <path d="M22 22C22 22 14 14 12 4C12 4 22 8 24 22" fill="white" opacity="0.7"/>
          </svg>
        </div>

        <h1 style={{fontSize:32,fontWeight:900,color:"#fff",margin:"0 0 6px",textAlign:"center",textShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>PlantKeeper</h1>
        <p style={{fontSize:14,color:"rgba(255,255,255,0.8)",margin:"0 0 36px",textAlign:"center",fontWeight:600}}>Jouw persoonlijke tuinassistent</p>

        <div style={{width:"100%",maxWidth:360,background:"rgba(255,255,255,0.97)",borderRadius:24,padding:"28px 24px",boxShadow:"0 16px 48px rgba(0,0,0,0.15)"}}>

          {stap === 1 && (
            <div>
              <p style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,margin:"0 0 6px"}}>Hoe heet jij?</p>
              <p style={{fontSize:13,color:T.textMid,margin:"0 0 16px",lineHeight:1.5}}>Zodat de app je persoonlijk begroet.</p>
              <input
                value={naam}
                onChange={function(e){ setNaam(e.target.value); }}
                onKeyDown={function(e){ if(e.key==="Enter"&&naam.trim()) setStap(2); }}
                placeholder="Jouw voornaam"
                autoFocus
                style={{width:"100%",background:T.bg,border:"2px solid "+T.border,borderRadius:12,color:T.text,fontFamily:T.sans,fontSize:16,padding:"13px 16px",outline:"none",boxSizing:"border-box",marginBottom:14}}
              />
              <button
                onClick={function(){ if(naam.trim()) setStap(2); }}
                disabled={!naam.trim()}
                style={{width:"100%",padding:"14px",borderRadius:13,background:naam.trim()?T.green:"#ccc",border:"none",color:"#fff",fontFamily:T.sans,fontWeight:900,fontSize:15,cursor:naam.trim()?"pointer":"not-allowed"}}>
                Volgende →
              </button>
            </div>
          )}

          {stap === 2 && (
            <div>
              <button onClick={function(){ setStap(1); }} style={{background:"none",border:"none",color:T.textMuted,cursor:"pointer",fontFamily:T.sans,fontSize:12,padding:0,marginBottom:14}}>← Terug</button>
              <p style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,margin:"0 0 6px"}}>Waar woon je?</p>
              <p style={{fontSize:13,color:T.textMid,margin:"0 0 16px",lineHeight:1.5}}>Voor lokaal weeradvies en seizoenstips.</p>
              <input
                value={stad}
                onChange={function(e){ setStad(e.target.value); }}
                onKeyDown={function(e){ if(e.key==="Enter") opslaan(); }}
                placeholder="Bijv. Amersfoort, Amsterdam..."
                autoFocus
                style={{width:"100%",background:T.bg,border:"2px solid "+T.border,borderRadius:12,color:T.text,fontFamily:T.sans,fontSize:16,padding:"13px 16px",outline:"none",boxSizing:"border-box",marginBottom:14}}
              />
              <button
                onClick={opslaan}
                style={{width:"100%",padding:"14px",borderRadius:13,background:T.green,border:"none",color:"#fff",fontFamily:T.sans,fontWeight:900,fontSize:15,cursor:"pointer",marginBottom:8}}>
                {"Aan de slag, "+naam.trim()+" 🌿"}
              </button>
              <button
                onClick={opslaan}
                style={{width:"100%",padding:"10px",borderRadius:13,background:"transparent",border:"none",color:T.textMuted,fontFamily:T.sans,fontWeight:600,fontSize:13,cursor:"pointer"}}>
                Overslaan (locatie later instellen)
              </button>
            </div>
          )}

        </div>

        <p style={{fontSize:11,color:"rgba(255,255,255,0.5)",margin:"24px 0 0",textAlign:"center"}}>Jouw gegevens blijven op dit apparaat</p>
      </div>
    );
  }

  // ── RENDER ─────────────────────────────────────────────────────────────────────
  var NAV = [
    {id:"dashboard",    label:"Home"},
    {id:"planner",      label:"Planner"},
    {id:"meldingen",    label:"Wekker"},
    {id:"database",     label:"Zoeken"},
    {id:"dokter",       label:"Dokter"},
    {id:"instellingen", label:"Inst."},
  ];
  var NAV_ICONS = {
    dashboard: <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 3L21 9V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9Z" fill="currentColor" opacity="0.85"/></svg>,
    planner:   <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="3" fill="currentColor" opacity="0.15" stroke="currentColor" strokeWidth="1.8"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" strokeWidth="1.8"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/><circle cx="8" cy="14" r="1.5" fill="currentColor"/><circle cx="12" cy="14" r="1.5" fill="currentColor"/><circle cx="16" cy="14" r="1.5" fill="currentColor"/><circle cx="8" cy="18" r="1.5" fill="currentColor"/></svg>,
    meldingen: <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C9.24 2 7 4.24 7 7V11L5 13V15H19V13L17 11V7C17 4.24 14.76 2 12 2Z" fill="currentColor" opacity="0.85"/><path d="M10 17C10 18.1 10.9 19 12 19C13.1 19 14 18.1 14 17" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>,
    database:  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="1.8" fill="currentColor" opacity="0.12"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/></svg>,
    instellingen: <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="2.5" fill="currentColor"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><circle cx="12" cy="12" r="4" stroke="currentColor" strokeWidth="1.8" fill="none"/></svg>,
    dokter: <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="currentColor" opacity="0.15"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke="currentColor" strokeWidth="1.8" fill="none"/><path d="M12 7v5M12 15v1" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/><path d="M9 10h6" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>,
  };

  if (!onboardingDone) {
    return <OnboardingScreen />;
  }

  if (profielPlant) {
    return <PlantProfielScreen />;
  }

  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:T.sans,paddingBottom:80}}>
      <div style={{background:T.surface,padding:"12px 18px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:30,boxShadow:"0 1px 14px rgba(29,58,25,0.07)"}}>
        <div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,"+T.green+","+T.greenAccent+")",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <svg width="20" height="20" viewBox="0 0 48 48" fill="none">
            <path d="M24 44C24 44 22 30 22 22" stroke="white" strokeWidth="3" strokeLinecap="round"/>
            <path d="M22 22C22 22 10 18 6 10C6 10 14 10 20 18" fill="white" opacity="0.9"/>
            <path d="M22 22C22 22 28 12 38 10C38 10 36 20 24 24" fill="white" opacity="0.9"/>
            <path d="M22 22C22 22 14 14 12 4C12 4 22 8 24 22" fill="white" opacity="0.7"/>
          </svg>
        </div>
        <div>
          <p style={{fontSize:17,fontWeight:900,color:T.text,margin:0,lineHeight:1}}>PlantKeeper</p>
          <p style={{fontSize:10,color:T.textMuted,margin:"1px 0 0",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Seizoen 2026</p>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
          <div style={{background:T.greenLight,borderRadius:999,padding:"5px 12px"}}>
            <span style={{fontSize:11,fontWeight:800,color:T.green}}>{userCity ? userCity+" - " : ""}Wk {currentWeek}</span>
          </div>
          <button onClick={function(){
            var next = !darkMode;
            setDarkMode(next);
            setStore(function(prev){ var n=Object.assign({},prev); n.__darkMode=next; saveStore(n); return n; });
          }} style={{width:34,height:34,borderRadius:10,border:"2px solid "+T.border,background:T.surface,color:T.textMid,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            {darkMode ? "☀️" : "🌙"}
          </button>
        </div>
      </div>

      {pendingAlarm && (
        <div style={{background:"#2D5A8E",padding:"11px 18px",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:18,flexShrink:0}}>⏰</span>
          <div style={{flex:1}}>
            <p style={{fontSize:13,fontWeight:800,color:"#fff",margin:0}}>Wekker aangevraagd</p>
            <p style={{fontSize:11,color:"rgba(255,255,255,0.75)",margin:"1px 0 0"}}>{pendingAlarm.message} - elke {["Zo","Ma","Di","Wo","Do","Vr","Za"][pendingAlarm.day]} om {String(pendingAlarm.hour).padStart(2,"0")}:{String(pendingAlarm.minute).padStart(2,"0")}</p>
          </div>
          <button onClick={function(){ setPendingAlarm(null); }} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontWeight:700,fontSize:12}}>Ok</button>
        </div>
      )}

      {screen==="dashboard"  && <Dashboard/>}
      {screen==="planner"    && <Planner/>}
      {screen==="meldingen"  && <MeldingenScreen/>}
      {screen==="database"   && <DatabaseScreen/>}
      {screen==="instellingen" && <InstellingenScreen/>}
      {screen==="dokter"       && <PlantDokterScreen/>}

      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:40,background:T.surface,borderTop:"1px solid "+T.border,boxShadow:"0 -2px 18px rgba(29,58,25,0.08)"}}>
        <div style={{display:"flex",padding:"8px 4px 16px"}}>
          {NAV.map(function(n) {
            var isA = screen===n.id;
            return (
              <button key={n.id} onClick={function(){ setScreen(n.id); }} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",color:isA?T.green:T.textMuted,padding:"4px 2px",borderRadius:12}}>
                <div style={{width:38,height:38,borderRadius:12,background:isA?T.greenLight:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s"}}>
                  {NAV_ICONS[n.id]}
                </div>
                <span style={{fontSize:9,fontWeight:isA?800:600,textTransform:"uppercase",letterSpacing:0.5,whiteSpace:"nowrap"}}>{n.label}</span>
                {isA && <div style={{width:16,height:3,background:T.green,borderRadius:99}} />}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

const domContainer = document.getElementById('root');
const root = ReactDOM.createRoot(domContainer);
root.render(React.createElement(PlantKeeper));
  </script>
</body>
</html>
