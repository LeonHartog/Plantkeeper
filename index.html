<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bezoek oma</title>
<style>
  :root{
    --cream:#F6F1E9;
    --paper:#FFFFFF;
    --ink:#3A3530;
    --ink-soft:#6b6259;
    --sage:#7C9473;
    --sage-deep:#5F7857;
    --sage-pale:#E7EEE3;
    --line:#E8E1D4;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Iowan Old Style','Georgia',serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 16px 60px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:22px;
  }
  .brand-mark{
    width:32px;height:32px;border-radius:50%;
    background:var(--sage);
    display:flex;align-items:center;justify-content:center;
    color:white;font-size:15px;flex-shrink:0;
  }
  .brand-text{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:12px;letter-spacing:0.06em;text-transform:uppercase;
    color:var(--ink-soft);
  }
  .sans{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

  /* --- Naam-scherm --- */
  #nameScreen{
    display:flex;
    flex-direction:column;
    min-height:60vh;
    justify-content:center;
    text-align:center;
  }
  #nameScreen h1{font-size:26px;line-height:1.3;margin:0 0 10px;font-weight:400;}
  #nameScreen p{color:var(--ink-soft);font-size:15px;margin:0 0 26px;line-height:1.5;}
  input[type="text"]{
    width:100%;padding:15px 17px;font-size:16px;
    border:1.5px solid var(--line);border-radius:var(--radius);
    background:var(--paper);color:var(--ink);outline:none;
    transition:border-color .15s ease;
  }
  input[type="text"]:focus{border-color:var(--sage);}
  button{border:none;cursor:pointer;font-weight:600;}
  .btn-primary{
    margin-top:14px;width:100%;padding:15px;font-size:15px;
    border-radius:var(--radius);background:var(--sage-deep);color:white;
    transition:opacity .15s ease, transform .1s ease;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{opacity:0.4;cursor:default;}

  /* --- Who bar --- */
  #mainScreen{display:none;}
  .who{
    font-size:13px;color:var(--ink-soft);margin-bottom:18px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .who button{background:none;color:var(--sage-deep);font-size:13px;text-decoration:underline;font-weight:400;padding:4px;}

  /* --- Maand navigatie --- */
  .month-nav{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:16px;
  }
  .month-nav h2{font-size:21px;font-weight:400;margin:0;text-transform:capitalize;}
  .nav-btn{
    background:var(--paper);border:1px solid var(--line);
    width:38px;height:38px;border-radius:50%;
    font-size:16px;color:var(--sage-deep);
    display:flex;align-items:center;justify-content:center;
  }
  .nav-btn:active{transform:scale(0.95);}

  /* --- Kalender grid --- */
  .weekday-row{
    display:grid;grid-template-columns:repeat(7,1fr);
    margin-bottom:6px;
  }
  .weekday-row span{
    text-align:center;font-size:11px;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:0.04em;
  }
  .grid{
    display:grid;grid-template-columns:repeat(7,1fr);
    gap:5px;
  }
  .cell{
    aspect-ratio:1;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    position:relative;
    padding:4px;
  }
  .cell.empty{background:none;border:none;}
  .cell.today{border-color:var(--sage);box-shadow:0 0 0 1px var(--sage);}
  .cell.has-coverage{background:var(--sage-pale);border-color:var(--sage);}
  .cell .num{font-size:14px;}
  .cell.has-coverage .num{color:var(--sage-deep);font-weight:700;}
  .cell .dot-row{
    display:flex;gap:2px;margin-top:3px;
    max-width:90%;flex-wrap:wrap;justify-content:center;
  }
  .cell .dot{width:5px;height:5px;border-radius:50%;background:var(--sage-deep);}

  /* --- Dag detail --- */
  #dayScreen{display:none;}
  .day-header{
    display:flex;align-items:center;gap:10px;margin-bottom:6px;
  }
  .back-btn{
    background:var(--paper);border:1px solid var(--line);
    width:36px;height:36px;border-radius:50%;
    font-size:16px;color:var(--ink);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .day-header h2{font-size:20px;font-weight:400;margin:0;text-transform:capitalize;}
  .day-sub{font-size:13px;color:var(--ink-soft);margin-bottom:18px;}
  .hours{display:flex;flex-direction:column;gap:6px;}
  .hour-row{
    display:flex;align-items:center;gap:10px;
    background:var(--paper);border:1px solid var(--line);
    border-radius:11px;padding:10px 12px;
    cursor:pointer;transition:background .15s ease, border-color .15s ease;
  }
  .hour-row.mine{
    background:var(--sage-deep);border-color:var(--sage-deep);
  }
  .hour-row.others-only{
    background:var(--sage-pale);border-color:var(--sage);
  }
  .hour-row:active{transform:scale(0.99);}
  .hour-label{
    font-size:13px;color:var(--ink-soft);width:44px;flex-shrink:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  .hour-row.mine .hour-label{color:rgba(255,255,255,0.75);}
  .hour-row.others-only .hour-label{color:var(--sage-deep);}
  .hour-names{
    font-size:13px;flex:1;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:#B0A99C;font-style:italic;
  }
  .hour-row.mine .hour-names{color:white;font-style:normal;font-weight:600;}
  .hour-row.others-only .hour-names{color:var(--sage-deep);font-style:normal;font-weight:600;}

  .footer-note{text-align:center;font-size:12px;color:#B0A99C;margin-top:24px;}

  #toast{
    position:fixed;bottom:24px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--cream);
    padding:12px 20px;border-radius:999px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:13px;opacity:0;transition:all .25s ease;
    pointer-events:none;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="brand-mark">♥</div>
    <div class="brand-text sans">Bezoek aan oma</div>
  </div>

  <!-- Naam invullen -->
  <div id="nameScreen">
    <h1>Wie ben je?</h1>
    <p class="sans">Vul je naam in, dan kun je aangeven wanneer je langsgaat bij oma.</p>
    <input type="text" id="nameInput" placeholder="Je naam" maxlength="40" autocomplete="off">
    <button class="btn-primary sans" id="startBtn" disabled>Verder</button>
  </div>

  <!-- Maandoverzicht -->
  <div id="mainScreen">
    <div class="who sans">
      <span>Ingelogd als <strong id="whoName"></strong></span>
      <button id="changeNameBtn">niet jij?</button>
    </div>

    <div class="month-nav">
      <button class="nav-btn" id="prevMonth">‹</button>
      <h2 id="monthTitle"></h2>
      <button class="nav-btn" id="nextMonth">›</button>
    </div>

    <div class="weekday-row sans">
      <span>ma</span><span>di</span><span>wo</span><span>do</span><span>vr</span><span>za</span><span>zo</span>
    </div>
    <div class="grid" id="grid"></div>

    <div class="footer-note sans">Gemaakt met liefde voor oma</div>
  </div>

  <!-- Dagdetail -->
  <div id="dayScreen">
    <div class="day-header">
      <button class="back-btn" id="backBtn">‹</button>
      <h2 id="dayTitle"></h2>
    </div>
    <div class="day-sub sans">Tik op een uur om aan te geven dat je er bent. Groen = bezet.</div>
    <div class="hours" id="hours"></div>
  </div>

</div>

<div id="toast"></div>

<!-- Firebase (gedeelde opslag). Vul hieronder je eigen configuratie in, zie de instructies. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB4aAUh92ENHh9Ny1J3TvqyUq3DpjoX5HE",
    authDomain: "oma-agenda.firebaseapp.com",
    projectId: "oma-agenda",
    storageBucket: "oma-agenda.firebasestorage.app",
    messagingSenderId: "212122560299",
    appId: "1:212122560299:web:0d21901499605fff9e476e"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const scheduleDocRef = db.collection('oma-agenda').doc('schedule');
  if(firebaseConfig.apiKey.indexOf('PLAK_HIER') === 0){
    window.addEventListener('DOMContentLoaded', ()=>{
      alert('Let op: de Firebase-configuratie is nog niet ingevuld. Iedereens invoer wordt daardoor nog niet gedeeld of onthouden. Zie de instructies om dit te koppelen.');
    });
  }
</script>

<script>
(function(){
  const dayNamesNlFull = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  const monthNamesNl = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

  const nameScreen = document.getElementById('nameScreen');
  const mainScreen = document.getElementById('mainScreen');
  const dayScreen = document.getElementById('dayScreen');
  const nameInput = document.getElementById('nameInput');
  const startBtn = document.getElementById('startBtn');
  const whoName = document.getElementById('whoName');
  const changeNameBtn = document.getElementById('changeNameBtn');
  const grid = document.getElementById('grid');
  const monthTitle = document.getElementById('monthTitle');
  const prevMonthBtn = document.getElementById('prevMonth');
  const nextMonthBtn = document.getElementById('nextMonth');
  const backBtn = document.getElementById('backBtn');
  const dayTitle = document.getElementById('dayTitle');
  const hoursEl = document.getElementById('hours');
  const toastEl = document.getElementById('toast');

  let myName = null;
  let schedule = {}; // { "YYYY-MM-DD": { "14": ["naam1","naam2"], ... } }
  let viewYear, viewMonth;
  let selectedDateKey = null;

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'), 1600);
  }

  function pad(n){ return String(n).padStart(2,'0'); }
  function dateKey(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }

  function rerenderCurrentScreen(){
    if(dayScreen.style.display === 'block'){
      renderHours();
    } else if(mainScreen.style.display === 'block'){
      renderMonth();
    }
  }

  async function loadSchedule(){
    try{
      const doc = await scheduleDocRef.get();
      schedule = doc.exists && doc.data().json ? JSON.parse(doc.data().json) : {};
    }catch(e){ schedule = {}; toast('Kon gegevens niet laden'); }
  }
  async function saveSchedule(){
    try{
      await scheduleDocRef.set({ json: JSON.stringify(schedule) });
    }catch(e){ toast('Opslaan lukte niet'); }
  }
  scheduleDocRef.onSnapshot((doc)=>{
    schedule = doc.exists && doc.data().json ? JSON.parse(doc.data().json) : {};
    rerenderCurrentScreen();
  }, (err)=>{ /* stille fout, initiele load vangt dit al af */ });

  async function loadMyName(){
    myName = localStorage.getItem('oma-cal-myname') || null;
  }
  async function saveMyName(name){
    localStorage.setItem('oma-cal-myname', name);
  }

  function renderMonth(){
    monthTitle.textContent = monthNamesNl[viewMonth] + ' ' + viewYear;
    grid.innerHTML = '';

    const firstOfMonth = new Date(viewYear, viewMonth, 1);
    let startOffset = (firstOfMonth.getDay() + 6) % 7; // ma=0 ... zo=6
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

    const today = new Date();
    today.setHours(0,0,0,0);

    for(let i=0;i<startOffset;i++){
      const filler = document.createElement('div');
      filler.className = 'cell empty';
      grid.appendChild(filler);
    }

    for(let d=1; d<=daysInMonth; d++){
      const key = dateKey(viewYear, viewMonth, d);
      const cellDate = new Date(viewYear, viewMonth, d);
      const dayData = schedule[key] || {};
      const namesSet = new Set();
      Object.values(dayData).forEach(arr=> (arr||[]).forEach(n=>namesSet.add(n)));

      const cell = document.createElement('div');
      cell.className = 'cell' + (cellDate.getTime()===today.getTime() ? ' today' : '') + (namesSet.size>0 ? ' has-coverage' : '');

      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = d;
      cell.appendChild(num);

      if(namesSet.size>0){
        const dotRow = document.createElement('div');
        dotRow.className = 'dot-row';
        const count = Math.min(namesSet.size, 5);
        for(let i2=0;i2<count;i2++){
          const dot = document.createElement('div');
          dot.className = 'dot';
          dotRow.appendChild(dot);
        }
        cell.appendChild(dotRow);
      }

      cell.addEventListener('click', ()=>openDay(key));
      grid.appendChild(cell);
    }
  }

  function openDay(key){
    selectedDateKey = key;
    const [y,m,d] = key.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    dayTitle.textContent = dayNamesNlFull[dt.getDay()] + ' ' + d + ' ' + monthNamesNl[m-1];

    mainScreen.style.display = 'none';
    dayScreen.style.display = 'block';
    renderHours();
  }

  function renderHours(){
    hoursEl.innerHTML = '';
    const dayData = schedule[selectedDateKey] || {};
    for(let h=0; h<24; h++){
      const names = dayData[String(h)] || [];
      const iAmIn = myName && names.includes(myName);

      const row = document.createElement('div');
      row.className = 'hour-row' + (iAmIn ? ' mine' : (names.length>0 ? ' others-only' : ''));

      const label = document.createElement('div');
      label.className = 'hour-label';
      label.textContent = pad(h) + ':00';

      const namesEl = document.createElement('div');
      namesEl.className = 'hour-names';
      namesEl.textContent = names.length>0 ? names.join(', ') : 'Niemand';

      row.appendChild(label);
      row.appendChild(namesEl);
      row.addEventListener('click', ()=>toggleHour(h));
      hoursEl.appendChild(row);
    }
  }

  async function toggleHour(h){
    if(!myName) return;
    if(!schedule[selectedDateKey]) schedule[selectedDateKey] = {};
    const key = String(h);
    if(!schedule[selectedDateKey][key]) schedule[selectedDateKey][key] = [];
    const arr = schedule[selectedDateKey][key];
    const idx = arr.indexOf(myName);
    if(idx === -1){
      arr.push(myName);
      toast(pad(h)+':00 toegevoegd');
    } else {
      arr.splice(idx,1);
      toast(pad(h)+':00 verwijderd');
    }
    renderHours();
    await saveSchedule();
  }

  function closeDay(){
    dayScreen.style.display = 'none';
    mainScreen.style.display = 'block';
    renderMonth();
  }

  function showMain(){
    nameScreen.style.display = 'none';
    dayScreen.style.display = 'none';
    mainScreen.style.display = 'block';
    whoName.textContent = myName;
    renderMonth();
  }

  function showNameScreen(){
    mainScreen.style.display = 'none';
    dayScreen.style.display = 'none';
    nameScreen.style.display = 'flex';
    nameInput.value = myName || '';
    startBtn.disabled = !nameInput.value.trim();
    nameInput.focus();
  }

  nameInput.addEventListener('input', ()=>{ startBtn.disabled = !nameInput.value.trim(); });
  nameInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter' && !startBtn.disabled) startBtn.click(); });

  startBtn.addEventListener('click', async ()=>{
    const name = nameInput.value.trim();
    if(!name) return;
    myName = name;
    await saveMyName(name);
    showMain(); // meteen doorgaan, niet wachten op de database
    loadSchedule().then(()=>rerenderCurrentScreen()); // gegevens op de achtergrond ophalen
  });

  changeNameBtn.addEventListener('click', showNameScreen);
  backBtn.addEventListener('click', closeDay);

  prevMonthBtn.addEventListener('click', ()=>{
    viewMonth--;
    if(viewMonth<0){ viewMonth=11; viewYear--; }
    renderMonth();
  });
  nextMonthBtn.addEventListener('click', ()=>{
    viewMonth++;
    if(viewMonth>11){ viewMonth=0; viewYear++; }
    renderMonth();
  });

  async function init(){
    const now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();

    await loadMyName();
    if(myName){
      showMain();
      loadSchedule().then(()=>rerenderCurrentScreen());
    } else {
      showNameScreen();
    }
  }

  init();
})();
</script>
</body>
</html>
