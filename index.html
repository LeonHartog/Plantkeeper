// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getISOWeek(d) {
  const u = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = u.getUTCDay() || 7;
  u.setUTCDate(u.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(u.getUTCFullYear(), 0, 1));
  return Math.ceil((((u - y) / 86400000) + 1) / 7);
}
function getSundayOfWeek(w, year = 2026) {
  const jan4 = new Date(year, 0, 4);
  const day = jan4.getDay() || 7;
  const mon1 = new Date(jan4);
  mon1.setDate(jan4.getDate() - (day - 1));
  const monW = new Date(mon1);
  monW.setDate(mon1.getDate() + (w - 1) * 7);
  const sun = new Date(monW);
  sun.setDate(monW.getDate() + 6);
  return sun;
}
function fmtDate(d) { return d.toLocaleDateString("nl-NL", { day: "numeric", month: "short" }); }
function fmtFull(d) { return d.toLocaleDateString("nl-NL", { weekday: "long", day: "numeric", month: "long" }); }
function taskKey(pid, w, tid) { return pid + "-" + w + "-" + tid; }
function noteKey(pid, w)      { return "note-" + pid + "-" + w; }

// ─── STORAGE ──────────────────────────────────────────────────────────────────
const SK = "plantkeeper-v11.10";
let _mem = {};
function loadStore() {
  try { const r = localStorage.getItem(SK); if (r) { _mem = JSON.parse(r); return _mem; } } catch(e) {}
  return _mem;
}
function saveStore(d) {
  _mem = d;
  try { localStorage.setItem(SK, JSON.stringify(d)); } catch(e) {}
}

function freqToFilter(freq) {
  // Zet freq-tekst om naar weekfilter functie
  if (!freq) return function(){ return true; };
  var f = freq.toLowerCase();
  if (f.indexOf("wekelijks") >= 0 || f.indexOf("elke week") >= 0) return function(){ return true; };
  if (f.indexOf("om de 2 weken") >= 0 || f.indexOf("2 weken") >= 0) return function(w){ return w%2===0; };
  if (f.indexOf("om de 3 weken") >= 0) return function(w){ return w%3===0; };
  if (f.indexOf("maandelijks") >= 0 || f.indexOf("per maand") >= 0) return function(w){ return w%4===0; };
  if (f.indexOf("1x per jaar") >= 0 || f.indexOf("seizoen") >= 0) return function(w){ return w===14; };
  if (f.indexOf("2x per seizoen") >= 0) return function(w){ return w===14||w===27; };
  return function(w){ return w%3===0; };
}

function parsePeriodWeeks(period) {
  // Haal weekStart/weekEnd uit periode string als mogelijk
  // bijv "Wk 19-33" -> {start:19, end:33}
  // bijv "Mrt-aug" -> {start:14, end:33} (maanden naar weken)
  if (!period) return {start:14, end:35};
  var wkMatch = period.match(/[Ww]k\s*(\d+)[^\d]+(\d+)/);
  if (wkMatch) return {start:parseInt(wkMatch[1]), end:parseInt(wkMatch[2])};
  // Maanden naar weken (globaal)
  var maanden = {jan:1,feb:5,mrt:9,apr:13,mei:18,jun:22,jul:26,aug:30,sept:35,okt:39,nov:42,dec:44};
  var parts = period.toLowerCase().replace(/\s/g,'').split(/[-,\/]/);
  var start = 14, end = 35;
  if (parts[0] && maanden[parts[0].substring(0,3)]) start = maanden[parts[0].substring(0,3)];
  if (parts[1] && maanden[parts[1].substring(0,3)]) end   = maanden[parts[1].substring(0,3)];
  return {start: start, end: end};
}

function getTasksForPlant(plant) {
  if (PALM_TASKS[plant.id]) return PALM_TASKS[plant.id];
  if (plant.dbId) {
    var palmKey = plant.dbId.replace("db-", "");
    if (PALM_TASKS[palmKey]) return PALM_TASKS[palmKey];
  }
  var db = PLANT_DB.find(function(d){ return d.id === plant.dbId; });
  if (!db) return [];

  var tasks = [{
    id:"water", cat:"Water", weekStart:14, weekEnd:44,
    getText: function(){ return db.waterAdvice || "Zie wateradvies in het plantprofiel."; }
  }];

  if (db.feeding) {
    db.feeding.forEach(function(f, i) {
      var periode = parsePeriodWeeks(f.period);
      var filterFn = freqToFilter(f.freq);
      // Gebruik closure correctement met IIFE
      tasks.push((function(feeding, idx, ws, we, ff) {
        return {
          id: "feed-" + idx,
          cat: feeding.product,
          weekStart: ws,
          weekEnd: we,
          getText: function(){ return feeding.dose + " - " + feeding.freq + ". " + feeding.period; },
          owned: false,
          product: feeding.product,
          link: feeding.link,
          filterWeek: ff
        };
      })(f, i, periode.start, periode.end, filterFn));
    });
  }

  tasks.push({
    id:"stop", cat:"VOEDING STOP", weekStart:36, weekEnd:36, warn:true,
    getText: function(){ return "Geen meststof meer. Zachte groei is vorstgevoelig."; }
  });
  return tasks;
}

function buildWeeks(plant) {
  var tasks = getTasksForPlant(plant);
  var out = [];
  for (var w = 14; w <= 44; w++) {
    var wt = tasks.filter(function(t) {
      if (w < t.weekStart || w > t.weekEnd) return false;
      if (t.filterWeek && !t.filterWeek(w)) return false;
      return true;
    });
    if (wt.length) out.push({ weekNum:w, sunday:getSundayOfWeek(w), phase:getPhase(w), tasks:wt });
  }
  return out;
}

function MissingPlantForm({ dbSearch, T, userName }) {
  var [plantnaam, setPlantnaam] = React.useState(dbSearch || "");
  var [extra, setExtra]         = React.useState("");
  var [verzonden, setVerzonden] = React.useState(false);
  var [loading, setLoading]     = React.useState(false);
  var [opgeslagen, setOpgeslagen] = React.useState(false);

  // Sla melding op in localStorage zodat Leon ze kan inzien
  function slaOp(naam, toelichting) {
    try {
      var key = "plantkeeper-meldingen";
      var bestaand = JSON.parse(localStorage.getItem(key) || "[]");
      bestaand.push({
        id: Date.now(),
        datum: new Date().toLocaleDateString("nl-NL"),
        gebruiker: userName || "Onbekend",
        plant: naam,
        toelichting: toelichting,
        gelezen: false
      });
      localStorage.setItem(key, JSON.stringify(bestaand));
      setOpgeslagen(true);

    setLoading(true);

function BeheerderPanel({ T }) {
  var [code, setCode]       = React.useState("");
  var [unlocked, setUnlocked] = React.useState(false);
  var [meldingen, setMeldingen] = React.useState([]);
  var BEHEERDER_CODE = "Heej123=";

  function open() {
    if (code === BEHEERDER_CODE) {
      try {
        var data = JSON.parse(localStorage.getItem("plantkeeper-meldingen") || "[]");
        setMeldingen(data);
        setUnlocked(true);
      } catch(e) { setMeldingen([]); setUnlocked(true); }
    } else {
      alert("Onjuiste code.");
    }
  }

  function markeerGelezen(id) {
    try {
      var data = JSON.parse(localStorage.getItem("plantkeeper-meldingen") || "[]");
      data = data.map(function(m){ return m.id===id ? Object.assign({},m,{gelezen:true}) : m; });
      localStorage.setItem("plantkeeper-meldingen", JSON.stringify(data));
      setMeldingen(data);
    } catch(e) {}
  }

  function verwijder(id) {
    try {
      var data = JSON.parse(localStorage.getItem("plantkeeper-meldingen") || "[]");
      data = data.filter(function(m){ return m.id!==id; });
      localStorage.setItem("plantkeeper-meldingen", JSON.stringify(data));
      setMeldingen(data);
    } catch(e) {}
  }

  var ongelezen = meldingen.filter(function(m){ return !m.gelezen; }).length;

  if (!unlocked) {
    return (
      <div style={{background:T.surface,borderRadius:16,padding:"14px 16px",boxShadow:T.shadow}}>
        <p style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px"}}>Beheerder</p>
        <div style={{display:"flex",gap:8}}>
          <input
            value={code}
            onChange={function(e){ setCode(e.target.value); }}
            onKeyDown={function(e){ if(e.key==="Enter") open(); }}
            type="password"
            placeholder="Beheerderscode..."
            style={{flex:1,background:T.bg,border:"2px solid "+T.border,borderRadius:10,color:T.text,fontFamily:T.sans,fontSize:13,padding:"9px 12px",outline:"none"}}
          />
          <button onClick={open} style={{padding:"9px 16px",borderRadius:10,background:T.green,border:"none",color:"#fff",fontFamily:T.sans,fontWeight:800,fontSize:13,cursor:"pointer"}}>Open</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{background:T.surface,borderRadius:16,padding:"14px 16px",boxShadow:T.shadow}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <p style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,margin:0}}>Plantmeldingen</p>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {ongelezen > 0 && <span style={{background:T.rust,color:"#fff",borderRadius:999,padding:"2px 8px",fontSize:11,fontWeight:800}}>{ongelezen} nieuw</span>}
          <button onClick={function(){ setUnlocked(false); setCode(""); }} style={{background:"none",border:"none",color:T.textMuted,cursor:"pointer",fontSize:12,fontFamily:T.sans}}>Vergrendel</button>
        </div>
      </div>
      {meldingen.length === 0 ? (
        <p style={{fontSize:13,color:T.textMuted,textAlign:"center",padding:"16px 0"}}>Nog geen meldingen ontvangen.</p>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {meldingen.map(function(m){
            return (
              <div key={m.id} style={{background:m.gelezen?T.bg:T.greenLight,borderRadius:12,padding:"10px 12px",border:"2px solid "+(m.gelezen?T.border:T.green+"40")}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div>
                    <p style={{fontSize:13,fontWeight:800,color:T.text,margin:0}}>{m.plant}</p>
                    <p style={{fontSize:10,color:T.textMuted,margin:"2px 0 0"}}>{m.datum} - {m.gebruiker}</p>
                  </div>
                  <div style={{display:"flex",gap:5}}>
                    {!m.gelezen && <button onClick={function(){ markeerGelezen(m.id); }} style={{background:T.green,border:"none",color:"#fff",borderRadius:8,padding:"4px 8px",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:T.sans}}>Gelezen</button>}
                    <button onClick={function(){ verwijder(m.id); }} style={{background:T.rustBg,border:"none",color:T.rust,borderRadius:8,padding:"4px 8px",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:T.sans}}>Verwijder</button>
                  </div>
                </div>
                {m.toelichting && <p style={{fontSize:11,color:T.textMid,margin:0,fontStyle:"italic",lineHeight:1.5}}>{m.toelichting}</p>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function PlantKeeper() {
  const today       = new Date();
  const currentWeek = getISOWeek(today);

  const [store, setStore]               = React.useState({});
  const [onboardingDone, setOnboardingDone] = React.useState(false);
  const [userName, setUserName]         = React.useState("");
  const [userCity, setUserCity]         = React.useState("");
  const [darkMode, setDarkMode]         = React.useState(false);
  const [accentKey, setAccentKey]       = React.useState("groen");
  const [myPlants, setMyPlants]         = React.useState(DEFAULT_PLANTS);
  const [screen, setScreen]             = React.useState("dashboard");
  const [activePlantId, setActivePlantId] = React.useState("archo");
  const [activeWeekIdx, setActiveWeekIdx] = React.useState(0);

  const [selectedDb, setSelectedDb]     = React.useState(null);
  const [addLocation, setAddLocation]   = React.useState("");
  const [addMedium, setAddMedium]       = React.useState("pot");
  const [addSize, setAddSize]           = React.useState("medium");
  const [confirmDelete, setConfirmDelete] = React.useState(null);
  const [profielPlant, setProfielPlant]   = React.useState(null);
  const [profielTab, setProfielTab]       = React.useState("info");
  const [plantNotes, setPlantNotes]       = React.useState({});
  const [reminders, setReminders]       = React.useState({});
  const [pendingAlarm, setPendingAlarm] = React.useState(null);
  const [weather, setWeather]           = React.useState(null);
  const [weatherLoading, setWeatherLoading] = React.useState(false);

  React.useEffect(function() {
    try {
      var s = loadStore();
      setStore(s);
      if (s.__plants) setMyPlants(s.__plants);
      if (s.__reminders) setReminders(s.__reminders);
      if (s.__darkMode) setDarkMode(s.__darkMode);
      if (s.__plantNotes) setPlantNotes(s.__plantNotes);
      if (s.__accentKey) setAccentKey(s.__accentKey);
      if (s.__userName) setUserName(s.__userName);
      if (s.__userCity) setUserCity(s.__userCity);
      if (s.__onboardingDone) setOnboardingDone(s.__onboardingDone);
    } catch(e) {}
  }, []);

  React.useEffect(function() {
    setWeatherLoading(true);
    var ctrl = new AbortController();
    var t = setTimeout(function(){ ctrl.abort(); }, 5000);
    fetch("https://api.open-meteo.com/v1/forecast?latitude=52.155&longitude=5.387&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,rain,weather_code,wind_speed_10m,wind_direction_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&wind_speed_unit=kmh&timezone=Europe%2FAmsterdam&forecast_days=4", { signal: ctrl.signal })
      .then(function(r){ return r.json(); })
      .then(function(d){ clearTimeout(t); setWeather(d); setWeatherLoading(false); })
      .catch(function(){ clearTimeout(t); setWeatherLoading(false); });
  }, []);

  React.useEffect(function() {
    function onAlarm(e) { setPendingAlarm(e.detail); }
    window.addEventListener("plantkeeper-alarm", onAlarm);
    return function() { window.removeEventListener("plantkeeper-alarm", onAlarm); };
  }, []);

  function update(k, v) {
    setStore(function(prev){ var n=Object.assign({},prev); n[k]=v; saveStore(n); return n; });
  }
  function updatePlants(p) {
    setMyPlants(p);
    setStore(function(prev){ var n=Object.assign({},prev); n.__plants=p; saveStore(n); return n; });
  }
  function saveReminder(key, val) {
    setReminders(function(prev) {
      var next = Object.assign({}, prev);
      if (val) next[key] = val; else delete next[key];
      setStore(function(s){ var n=Object.assign({},s); n.__reminders=next; saveStore(n); return n; });
      return next;
    });
  }

  T = darkMode ? T_DARK : T_LIGHT;
  var appGreen = ACCENT_COLORS[accentKey] || ACCENT_COLORS.groen;
  // Pas green kleuren aan op basis van accentKey
  T = Object.assign({}, T, {
    green: appGreen,
    greenMid: appGreen,
    greenAccent: appGreen,
    greenLight: darkMode ? appGreen+"22" : appGreen+"18",
    surfaceGreen: darkMode ? appGreen+"18" : appGreen+"14",
  });
  function savePlantNote(plantId, note) {
    var next = Object.assign({}, plantNotes);
    next[plantId] = note;
    setPlantNotes(next);
    setStore(function(prev){ var n=Object.assign({},prev); n.__plantNotes=next; saveStore(n); return n; });
  }

  var activePlant = myPlants.find(function(p){ return p.id===activePlantId; }) || myPlants[0];
  var weeks = buildWeeks(activePlant);
  var activeWeek = weeks[activeWeekIdx];
  var accent = activePlant ? activePlant.accentColor : T.green;

  React.useEffect(function() {
    var ws = buildWeeks(myPlants.find(function(p){ return p.id===activePlantId; }) || myPlants[0]);
    var idx = ws.findIndex(function(w){ return w.weekNum>=currentWeek; });
    setActiveWeekIdx(Math.max(0, idx===-1 ? ws.length-1 : idx));
  }, [activePlantId]);

  function toggle(wn, tid) {
    var k = taskKey(activePlantId, wn, tid);
    update(k, !store[k]);
  }

  function addWaterLog(pid) {
    var key = "wlog-"+pid;
    var entry = {id:Date.now(), date:today.toISOString().split("T")[0], ts:Date.now()};
    var arr = [entry].concat(store[key]||[]).slice(0,50);
    update(key, arr);
  }
  function delWaterLog(pid, lid) {
    update("wlog-"+pid, (store["wlog-"+pid]||[]).filter(function(l){ return l.id!==lid; }));
  }

  function addPlantFromDb(db) {
    var doseNote = addMedium==="pot"
      ? (addSize==="small"?"Halve dosering":addSize==="large"?"1.5x dosering":"Normale dosering")
      : (addSize==="large"?"1.5x dosering":"Normale dosering");
    var loc = addLocation || (addMedium==="pot"?"Pot":"Volle grond");
    var p = {id:"c-"+Date.now(),dbId:db.id,accentColor:db.accentColor,name:db.name,shortName:db.name,location:loc,medium:addMedium,size:addSize,doseNote:doseNote,winterHardy:db.winterHardy,growthRate:db.growthRate,light:db.light,isCustom:true};
    updatePlants(myPlants.concat([p]));
    setSelectedDb(null); setAddLocation(""); setAddMedium("pot"); setAddSize("medium");
    setScreen("planner"); setActivePlantId(p.id);
  }
  function removePlant(pid) {
    var remaining = myPlants.filter(function(p){ return p.id!==pid; });
    updatePlants(remaining);
    setConfirmDelete(null);
    setActivePlantId(remaining.length>0 ? remaining[0].id : "");
    setScreen("dashboard");
  }

  function plantPct(plant) {
    var ws = buildWeeks(plant);
    var total = ws.reduce(function(a,w){ return a+w.tasks.length; }, 0);
    var done  = ws.reduce(function(a,w){ return a+w.tasks.filter(function(t){ return store[taskKey(plant.id,w.weekNum,t.id)]; }).length; }, 0);
    return total ? Math.round(done/total*100) : 0;
  }
  function weekInfo(plant, wn) {
    var ws = buildWeeks(plant);
    var wk = ws.find(function(w){ return w.weekNum===wn; });
    if (!wk) return {done:0,total:0};
    return {done:wk.tasks.filter(function(t){ return store[taskKey(plant.id,wk.weekNum,t.id)]; }).length, total:wk.tasks.length};
  }

  var thisWeekTodo = myPlants.reduce(function(acc, p) {
    var ws = buildWeeks(p);
    var wk = ws.find(function(w){ return w.weekNum===currentWeek; });
    if (!wk) return acc;
    return acc.concat(wk.tasks.filter(function(t){ return !store[taskKey(p.id,wk.weekNum,t.id)]; }).map(function(t){ return {plant:p,task:t}; }));
  }, []);

  var wInfo = weekInfo(activePlant, activeWeek ? activeWeek.weekNum : 0);
  var wDone = wInfo.done, wTotal = wInfo.total;
  var weekComplete = activeWeek && wDone===wTotal && wTotal>0;
  var wrap = {maxWidth:680,margin:"0 auto",padding:"20px 16px 100px",width:"100%"};

  // ── WEATHER CARD ──────────────────────────────────────────────────────────────
  function WeatherCard() {
    // Seizoensgebaseerde weerwidget met slimme plantenmeldingen
    // Wordt live zodra de app gehost is (Open-Meteo API op basis van userCity)
    var month = today.getMonth() + 1;
    var dag   = today.getDate();
    var fase  = getPhase(currentWeek);

    // Seizoenstemperatuur simulatie voor NL
    var gesimTemp = month<=2?3:month===3?8:month===4?12:month===5?17:month===6?20:month===7?23:month===8?22:month===9?17:month===10?11:month===11?6:4;
    var gesimIcon = month>=6&&month<=8?"☀️":month>=3&&month<=5?"🌤️":month>=9&&month<=10?"🌦️":"🌧️";
    var gesimLabel = month>=6&&month<=8?"Zonnig":month>=3&&month<=5?"Wisselend":month>=9&&month<=10?"Buiig":"Grijs";

    // Slimme plantenmeldingen op basis van seizoen + fase
    var meldingen = [];
    if (month>=6&&month<=8&&gesimTemp>25) meldingen.push({type:"warn",icon:"🌡️",tekst:"Warme dagen verwacht — geef extra water, bij voorkeur voor 9u of na 18u."});
    if (month>=6&&month<=8) meldingen.push({type:"info",icon:"💧",tekst:"Controleer dagelijks de vochtgraad. Palmen kunnen bij >28°C dagelijks water nodig hebben."});
    if (month===9||month===10) meldingen.push({type:"warn",icon:"🍂",tekst:"Nazomer: bouw voeding af. Voeding na week 36 geeft zachte groei die vorstschade oploopt."});
    if (month===10||month===11) meldingen.push({type:"alert",icon:"❄️",tekst:"Eerste nachtvorst mogelijk. Heb je vorstmaatregelen genomen voor je palmen en citrus?"});
    if (month===11||month===12||month===1) meldingen.push({type:"alert",icon:"🥶",tekst:"Winterperiode: minimaal water geven. Controleer vliesdoek en mulch regelmatig."});
    if (month===2||month===3) meldingen.push({type:"info",icon:"🌱",tekst:"Lente nadert. Controleer je planten op winterschade en maak ze klaar voor het seizoen."});
    if (month>=3&&month<=4) meldingen.push({type:"info",icon:"☀️",tekst:"Tijd om te starten met bemesting. Check je voorraad meststoffen."});
    if (month>=5&&month<=6) meldingen.push({type:"info",icon:"🌿",tekst:"Groeiseizoen in volle gang. Houd planten goed in de gaten op plagen en ziektes."});
    if (meldingen.length===0) meldingen.push({type:"info",icon:"🌱",tekst:"Goede tuindag. Controleer of er taken open staan in de planner."});

    var meldingKleur = {warn:"#E8A020",alert:"#C04040",info:T.green};

    return (
      <div style={{marginBottom:18}}>
        <div style={{background:"linear-gradient(135deg,#1A4A7A,#2D6AAE)",borderRadius:18,overflow:"hidden",boxShadow:T.shadow}}>
          <div style={{padding:"14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <p style={{fontSize:10,color:"rgba(255,255,255,0.6)",fontWeight:700,margin:"0 0 3px",textTransform:"uppercase",letterSpacing:1}}>{userCity||"Jouw tuin"} - {fmtDate(today)}</p>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:36}}>{gesimIcon}</span>
                  <div>
                    <p style={{fontSize:28,fontWeight:900,color:"#fff",margin:0,lineHeight:1}}>{gesimTemp}°</p>
                    <p style={{fontSize:12,color:"rgba(255,255,255,0.75)",margin:"2px 0 0",fontWeight:600}}>{gesimLabel}</p>
                  </div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{background:"rgba(255,255,255,0.15)",borderRadius:12,padding:"8px 12px",marginBottom:4}}>
                  <p style={{fontSize:10,color:"rgba(255,255,255,0.7)",margin:"0 0 1px",fontWeight:700}}>Seizoen</p>
                  <p style={{fontSize:16,fontWeight:900,color:"#fff",margin:0}}>{Math.round((currentWeek-14)/(44-14)*100)}%</p>
                </div>
                <p style={{fontSize:10,color:"rgba(255,255,255,0.6)",margin:0,fontWeight:600}}>{fase.label} - Wk {currentWeek}</p>
              </div>
            </div>
            <div style={{height:4,background:"rgba(255,255,255,0.15)",borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:Math.round((currentWeek-14)/(44-14)*100)+"%",background:"rgba(255,255,255,0.8)",borderRadius:99}}/>
            </div>
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.12)",padding:"10px 14px",background:"rgba(0,0,0,0.12)"}}>
            <p style={{fontSize:9,color:"rgba(255,255,255,0.4)",margin:"0 0 6px",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Live weer beschikbaar na installatie</p>
            <div style={{display:"flex",gap:14}}>
              {[{icon:"💧",label:"Vochtig",val:month>=4&&month<=9?"65%":"80%"},{icon:"💨",label:"Wind",val:month>=10||month<=3?"18km/u":"11km/u"},{icon:"🌧️",label:"Neerslag",val:month>=10||month<=3?"Kans hoog":"Kans laag"}].map(function(s,i){
                return (
                  <div key={i} style={{textAlign:"center"}}>
                    <p style={{fontSize:14,margin:"0 0 1px"}}>{s.icon}</p>
                    <p style={{fontSize:9,color:"rgba(255,255,255,0.5)",margin:0,fontWeight:600}}>{s.val}</p>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {meldingen.map(function(m, i){
          var kleur = meldingKleur[m.type] || T.green;
          return (
            <div key={i} style={{marginTop:8,background:T.surface,borderRadius:14,padding:"11px 14px",boxShadow:T.shadow,display:"flex",alignItems:"flex-start",gap:10,borderLeft:"4px solid "+kleur}}>
              <span style={{fontSize:18,flexShrink:0}}>{m.icon}</span>
              <p style={{fontSize:12,color:T.text,margin:0,lineHeight:1.55,fontWeight:500}}>{m.tekst}</p>
            </div>
          );
        })}
      </div>
    );
  }

  // ── DASHBOARD ─────────────────────────────────────────────────────────────────  // ── DASHBOARD ─────────────────────────────────────────────────────────────────
  function Dashboard() {
    return (
      <div style={wrap}>
        <p style={{fontSize:13,color:T.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{fmtFull(today)}</p>
        <h1 style={{fontSize:28,fontWeight:900,color:T.text,lineHeight:1.2,margin:"0 0 6px"}}>{"Hoi "+userName+"!"}</h1>
        <p style={{fontSize:14,color:T.textMid,fontWeight:600,marginBottom:20}}>
          {thisWeekTodo.length>0 ? thisWeekTodo.length+" taken staan klaar voor deze week" : "Alle taken voor deze week gedaan!"}
        </p>

        <WeatherCard />

        <div style={{borderRadius:20,overflow:"hidden",marginBottom:24,boxShadow:T.shadowLg,background:"linear-gradient(135deg,"+T.green+","+T.greenMid+")",padding:"18px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div>
              <p style={{fontSize:11,color:"rgba(255,255,255,0.7)",fontWeight:700,margin:"0 0 2px",textTransform:"uppercase",letterSpacing:1}}>Seizoen 2026</p>
              <p style={{fontSize:20,fontWeight:900,color:"#fff",margin:0}}>{getPhase(currentWeek).label} - week {currentWeek}</p>
            </div>
            <div style={{background:"rgba(255,255,255,0.2)",borderRadius:12,padding:"8px 14px",textAlign:"center"}}>
              <p style={{fontSize:20,fontWeight:900,color:"#fff",margin:0}}>{Math.round((currentWeek-14)/(44-14)*100)}%</p>
              <p style={{fontSize:10,color:"rgba(255,255,255,0.7)",margin:0,fontWeight:700}}>Seizoen</p>
            </div>
          </div>
          <div style={{height:6,background:"rgba(255,255,255,0.25)",borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:Math.round((currentWeek-14)/(44-14)*100)+"%",background:"rgba(255,255,255,0.9)",borderRadius:99}} />
          </div>
        </div>

        <p style={{fontSize:12,fontWeight:800,color:T.text,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Mijn planten</p>
        <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:24}}>
          {myPlants.map(function(p) {
            var pct = plantPct(p);
            var wi = weekInfo(p, currentWeek);
            return (
              <div key={p.id} style={{borderRadius:20,overflow:"hidden",boxShadow:T.shadow,cursor:"pointer"}}
                onClick={function(){ setActivePlantId(p.id); setScreen("planner"); }}>
                <div style={{height:120,background:"linear-gradient(135deg,"+p.accentColor+"DD,"+p.accentColor+"88)",position:"relative",display:"flex",alignItems:"flex-end",padding:"12px 16px"}}>
                  <div style={{position:"absolute",inset:0,opacity:0.07,backgroundImage:"radial-gradient(circle,#fff 1px,transparent 1px)",backgroundSize:"24px 24px"}} />
                  {wi.total>0 && <div style={{position:"absolute",top:10,right:12,background:"rgba(0,0,0,0.4)",backdropFilter:"blur(4px)",borderRadius:16,padding:"3px 10px",fontSize:11,fontWeight:800,color:"#fff"}}>{wi.done===wi.total?"✓ Week klaar":wi.done+"/"+wi.total+" taken"}</div>}
                  <div style={{position:"relative"}}>
                    <p style={{fontSize:16,fontWeight:900,color:"#fff",margin:0,textShadow:"0 1px 4px rgba(0,0,0,0.4)"}}>{p.shortName}</p>
                    <p style={{fontSize:11,color:"rgba(255,255,255,0.8)",margin:"1px 0 0",fontWeight:600}}>{p.location}</p>
                  </div>
                </div>
                <div style={{background:T.surface,padding:"10px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <span style={{fontSize:11,color:T.textMuted,fontWeight:600}}>Seizoen</span>
                    <span style={{fontSize:11,fontWeight:800,color:p.accentColor}}>{pct}%</span>
                  </div>
                  <PBar pct={pct} color={p.accentColor} h={6} />
                  <div style={{display:"flex",gap:7,marginTop:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,fontWeight:700,color:T.textMid,background:T.greenLight,padding:"2px 8px",borderRadius:999}}>{"❄ "+p.winterHardy}</span>
                    <span style={{fontSize:10,fontWeight:700,color:T.textMid,background:T.greenLight,padding:"2px 8px",borderRadius:999}}>{"☀ "+p.light}</span>
                    {p.doseNote && <span style={{fontSize:10,fontWeight:600,color:T.textMuted,background:T.surfaceGreen,padding:"2px 8px",borderRadius:999}}>{p.doseNote}</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {thisWeekTodo.length>0 && (
          <div style={{marginBottom:24}}>
            <p style={{fontSize:12,fontWeight:800,color:T.text,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Nog te doen</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {thisWeekTodo.slice(0,5).map(function(item, i) {
                return (
                  <div key={i} style={{background:T.surface,borderRadius:16,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:T.shadow}}>
                    <div style={{width:40,height:40,borderRadius:12,background:item.plant.accentColor+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🌿</div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:11,color:item.plant.accentColor,margin:0,fontWeight:800,textTransform:"uppercase"}}>{item.plant.shortName}</p>
                      <p style={{fontSize:13,fontWeight:700,color:T.text,margin:"2px 0 0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.task.cat}</p>
                    </div>
                    <SmallBtn onClick={function(){ setActivePlantId(item.plant.id); setScreen("planner"); }}>Open</SmallBtn>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {[{l:"Planten",v:myPlants.length},{l:"Week",v:currentWeek,sub:"van 44"},{l:"Fase",v:getPhase(currentWeek).label}].map(function(s,i) {
            return (
              <div key={i} style={{background:T.surface,borderRadius:16,padding:"14px 12px",textAlign:"center",boxShadow:T.shadow}}>
                <p style={{fontSize:22,fontWeight:900,color:T.green,margin:0,lineHeight:1}}>{s.v}</p>
                <p style={{fontSize:10,fontWeight:700,color:T.textMuted,margin:"3px 0 0",textTransform:"uppercase",letterSpacing:0.5}}>{s.l}</p>
                {s.sub && <p style={{fontSize:10,color:T.textMuted,margin:"1px 0 0"}}>{s.sub}</p>}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── PLANNER ───────────────────────────────────────────────────────────────────
  function Planner() {
    var isCurrentWeek = activeWeek && activeWeek.weekNum===currentWeek;
    return (
      <div>
        <div style={{background:T.surface,borderBottom:"1px solid "+T.border,padding:"10px 14px",display:"flex",gap:8,overflowX:"auto",scrollbarWidth:"none"}}>
          {myPlants.map(function(p) {
            var isA = activePlantId===p.id;
            return (
              <div key={p.id} style={{flexShrink:0,display:"flex",alignItems:"center",gap:4,padding:"6px 8px 6px 14px",borderRadius:999,border:"2.5px solid "+(isA?p.accentColor:T.border),background:isA?p.accentColor:T.surface}}>
                <button onClick={function(){ setActivePlantId(p.id); }} style={{background:"none",border:"none",color:isA?"#fff":T.textMid,fontFamily:T.sans,fontWeight:800,fontSize:13,cursor:"pointer",whiteSpace:"nowrap",padding:0}}>
                  {p.shortName}
                </button>
                {p.dbId && PLANT_DB.find(function(d){return d.id===p.dbId;}) && (
                  <button onClick={function(e){ e.stopPropagation(); setProfielPlant(p); }} style={{width:22,height:22,borderRadius:"50%",background:isA?"rgba(255,255,255,0.3)":T.greenLight,border:"2px solid "+(isA?"rgba(255,255,255,0.6)":T.green),color:isA?"#fff":T.green,fontFamily:T.sans,fontWeight:900,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:0,lineHeight:1}}>i</button>
                )}
              </div>
            );
          })}
        </div>
        <div style={{background:T.bg,borderBottom:"1px solid "+T.border,padding:"8px 14px",display:"flex",gap:7,overflowX:"auto",scrollbarWidth:"none",alignItems:"center"}}>
          {PHASES.map(function(ph) {
            var phW = weeks.filter(function(w){ return w.phase.id===ph.id; });
            if (!phW.length) return null;
            var isA = phW.some(function(w){ return w.weekNum===(activeWeek?activeWeek.weekNum:0); });
            return (
              <PillBtn key={ph.id} active={isA} color={ph.color} small onClick={function(){ var i=weeks.findIndex(function(w){ return w.phase.id===ph.id; }); if(i>=0) setActiveWeekIdx(i); }}>
                {ph.label}
              </PillBtn>
            );
          })}
          <div style={{marginLeft:"auto",display:"flex",gap:5}}>
            <button onClick={function(){ setActiveWeekIdx(function(i){ return Math.max(0,i-1); }); }} disabled={activeWeekIdx===0} style={{width:32,height:32,borderRadius:9,border:"2px solid "+T.border,background:T.surface,color:accent,fontWeight:900,fontSize:16,cursor:"pointer",opacity:activeWeekIdx===0?0.3:1}}>{"<"}</button>
            <button onClick={function(){ setActiveWeekIdx(function(i){ return Math.min(weeks.length-1,i+1); }); }} disabled={activeWeekIdx===weeks.length-1} style={{width:32,height:32,borderRadius:9,border:"2px solid "+T.border,background:T.surface,color:accent,fontWeight:900,fontSize:16,cursor:"pointer",opacity:activeWeekIdx===weeks.length-1?0.3:1}}>{">"}</button>
          </div>
        </div>
        <div style={{background:T.bg,borderBottom:"1px solid "+T.border,padding:"6px 14px",display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none"}}>
          {weeks.map(function(w, idx) {
            var done = w.tasks.every(function(t){ return store[taskKey(activePlantId,w.weekNum,t.id)]; });
            var partial = !done && w.tasks.some(function(t){ return store[taskKey(activePlantId,w.weekNum,t.id)]; });
            var isCur = w.weekNum===currentWeek;
            var isSel = idx===activeWeekIdx;
            return (
              <button key={w.weekNum} onClick={function(){ setActiveWeekIdx(idx); }} style={{flexShrink:0,width:34,height:34,borderRadius:10,border:"2.5px solid "+(isSel?accent:done?"#9AC89A":T.border),background:isSel?accent:done?"#D8EED8":T.surface,color:isSel?"#fff":done?T.green:isCur?T.amber:T.textMuted,fontSize:11,fontFamily:T.sans,fontWeight:800,cursor:"pointer",position:"relative"}}>
                {done ? "✓" : w.weekNum}
                {isCur&&!done && <div style={{position:"absolute",top:2,right:2,width:5,height:5,borderRadius:"50%",background:T.amber}} />}
                {partial&&!done && <div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:12,height:2,borderRadius:1,background:accent}} />}
              </button>
            );
          })}
        </div>

        {activeWeek && (
          <div style={wrap}>
            <div style={{background:"linear-gradient(135deg,"+accent+"EE,"+accent+"99)",borderRadius:18,padding:"14px 16px",marginBottom:16,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,opacity:0.07,backgroundImage:"radial-gradient(circle,#fff 1px,transparent 1px)",backgroundSize:"20px 20px"}}/>
              <div style={{position:"relative"}}>

                <p style={{fontSize:11,color:"rgba(255,255,255,0.7)",fontWeight:700,margin:"0 0 2px",textTransform:"uppercase",letterSpacing:1}}>{activePlant.location}</p>
                <h2 style={{fontSize:20,fontWeight:900,color:"#fff",margin:"0 0 2px",lineHeight:1.2,paddingRight:36}}>{activePlant.shortName}</h2>
                <p style={{fontSize:12,color:"rgba(255,255,255,0.75)",margin:"0 0 9px",fontStyle:"italic"}}>{activePlant.name}</p>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  <span style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:999}}>{"❄ "+activePlant.winterHardy}</span>
                  <span style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:999}}>{"☀ "+activePlant.light}</span>
                  {activePlant.doseNote && <span style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:999}}>{activePlant.doseNote}</span>}
                </div>
              </div>
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4}}>
                  <span style={{background:activeWeek.phase.bg,color:activeWeek.phase.color,fontFamily:T.sans,fontWeight:800,fontSize:12,padding:"4px 12px",borderRadius:999}}>{activeWeek.phase.label}</span>
                  {isCurrentWeek && <span style={{background:T.amberBg,color:T.amber,fontFamily:T.sans,fontWeight:800,fontSize:12,padding:"4px 12px",borderRadius:999}}>Deze week</span>}
                </div>
                <p style={{fontSize:17,fontWeight:900,color:T.text,margin:0}}>Zondag {fmtDate(activeWeek.sunday)}</p>
                <p style={{fontSize:12,color:T.textMid,margin:"2px 0 0",fontWeight:600}}>Week {activeWeek.weekNum} - {wDone}/{wTotal} gedaan</p>
              </div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {activeWeek.tasks.map(function(task) {
                var k = taskKey(activePlantId, activeWeek.weekNum, task.id);
                var done = !!store[k];
                return (
                  <div key={task.id} onClick={function(){ toggle(activeWeek.weekNum, task.id); }}
                    style={{background:done?T.greenLight:task.warn?T.rustBg:T.surface,border:"2px solid "+(done?"#B8DDB8":task.warn?"#EFBBA8":"transparent"),borderRadius:16,padding:"14px 16px",cursor:"pointer",display:"grid",gridTemplateColumns:"44px 1fr 32px",gap:"0 10px",alignItems:"start",boxShadow:done?"none":T.shadow,opacity:done?0.65:1,transition:"all 0.15s"}}>
                    <div style={{width:40,height:40,borderRadius:12,background:done?(accent+"20"):task.warn?T.rustBg:T.surfaceGreen,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
                      {task.warn ? "⛔" : "🌿"}
                    </div>
                    <div>
                      <p style={{fontSize:11,fontWeight:800,color:done?T.green:task.warn?T.rust:accent,margin:"0 0 2px",textTransform:"uppercase",letterSpacing:0.5}}>{task.cat}</p>
                      <p style={{fontSize:13,color:done?T.textMid:T.text,margin:0,lineHeight:1.5,fontWeight:500}}>{task.getText(activeWeek.weekNum)}</p>
                      {task.product && (
                        <div style={{marginTop:7,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                          <span style={{background:task.owned?T.greenLight:T.amberBg,color:task.owned?T.green:T.amber,fontFamily:T.sans,fontWeight:700,fontSize:11,padding:"3px 10px",borderRadius:999}}>{task.owned?"✓ In huis: ":"🛒 "}{task.product}</span>
                          {task.link&&!task.owned && <SmallBtn href={task.link} style={{padding:"3px 10px",fontSize:11}}>Bestellen</SmallBtn>}
                        </div>
                      )}
                      {task.warn && <div style={{marginTop:8,background:"#FDF0EB",border:"2px solid "+T.rust+"30",borderRadius:10,padding:"8px 12px",fontSize:12,color:T.rust,fontWeight:700}}>Meestgemaakte fout - te laat voeden is meer winterschade.</div>}
                    </div>
                    <Chk done={done} accent={accent} />
                  </div>
                );
              })}
            </div>

            <NoteBlock plantId={activePlantId} weekNum={activeWeek.weekNum} accent={accent} T={T} />

            {weekComplete && (
              <div style={{background:"linear-gradient(135deg,"+T.green+","+T.greenMid+")",borderRadius:18,padding:"20px",marginTop:14,textAlign:"center",boxShadow:T.shadowLg}}>
                <p style={{fontSize:26,margin:"0 0 6px"}}>🎉</p>
                <p style={{fontSize:18,fontWeight:900,color:"#fff",margin:"0 0 10px"}}>Week {activeWeek.weekNum} klaar!</p>
                {activeWeekIdx<weeks.length-1 && <button onClick={function(){ setActiveWeekIdx(function(i){ return i+1; }); }} style={{background:"rgba(255,255,255,0.25)",border:"2px solid rgba(255,255,255,0.4)",color:"#fff",fontFamily:T.sans,fontWeight:800,fontSize:13,padding:"9px 18px",borderRadius:999,cursor:"pointer"}}>Volgende week</button>}
              </div>
            )}
            {activeWeek.weekNum!==currentWeek && (
              <div style={{marginTop:12,textAlign:"center"}}>
                <SmallBtn variant="ghost" onClick={function(){ var i=weeks.findIndex(function(w){ return w.weekNum>=currentWeek; }); if(i>=0) setActiveWeekIdx(i); }}>Terug naar deze week</SmallBtn>
              </div>
            )}
            <div style={{marginTop:24,textAlign:"center"}}>
              <SmallBtn variant="danger" onClick={function(){ setConfirmDelete(activePlant.id); }}>Plant verwijderen</SmallBtn>
            </div>
          </div>
        )}

        {confirmDelete && (
          <div style={{position:"fixed",inset:0,background:"rgba(26,46,26,0.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20,backdropFilter:"blur(6px)"}}>
            <div style={{background:T.surface,borderRadius:22,padding:26,maxWidth:320,width:"100%",boxShadow:T.shadowLg}}>
              <p style={{fontSize:18,fontWeight:900,color:T.text,margin:"0 0 8px"}}>Plant verwijderen?</p>
              <p style={{fontSize:13,color:T.textMid,lineHeight:1.6,margin:"0 0 4px"}}>Alle data en notities worden permanent verwijderd.</p>
              {!activePlant.isCustom && <p style={{fontSize:12,color:T.rust,fontWeight:700,margin:"0 0 16px"}}>Let op: dit is een standaard palm.</p>}
              {activePlant.isCustom && <p style={{fontSize:12,color:T.textMuted,margin:"0 0 16px"}}> </p>}
              <div style={{display:"flex",gap:9}}>
                <BigBtn onClick={function(){ removePlant(confirmDelete); }} bg={T.rust} style={{flex:1,padding:"11px"}}>Verwijder</BigBtn>
                <SmallBtn variant="ghost" onClick={function(){ setConfirmDelete(null); }} style={{flex:1,justifyContent:"center",padding:"11px"}}>Annuleer</SmallBtn>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── DATABASE ───────────────────────────────────────────────────────────────────

    var [dbLightFilter, setDbLightFilter] = React.useState("alle");

    if (selectedDb) {

        ? (addSize==="small"?"Halve dosering":addSize==="large"?"1.5x dosering":"Normale dosering")

      return (
        <div style={wrap}>
          <SmallBtn variant="ghost" onClick={function(){ setSelectedDb(null); }} style={{marginBottom:18}}>Terug</SmallBtn>
          <div style={{height:160,borderRadius:18,overflow:"hidden",marginBottom:18,position:"relative",boxShadow:T.shadowLg,display:"flex",alignItems:"flex-end",padding:"16px 18px"}}>
            <PlantImage url={selectedDb.imageUrl} accentColor={selectedDb.accentColor} height={160} style={{position:"absolute",inset:0,borderRadius:18}}/>
            <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.6) 0%,rgba(0,0,0,0.1) 60%,transparent 100%)",borderRadius:18}}/>
            <div style={{position:"relative"}}>
              <h1 style={{fontSize:22,fontWeight:900,color:"#fff",margin:"0 0 2px"}}>{selectedDb.name}</h1>
              <p style={{fontSize:12,color:"rgba(255,255,255,0.8)",margin:"0 0 8px",fontStyle:"italic"}}>{selectedDb.latin}</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[selectedDb.category, selectedDb.winterHardy, selectedDb.light].map(function(tag,i){ return <span key={i} style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontWeight:700,fontSize:11,padding:"3px 10px",borderRadius:999}}>{tag}</span>; })}
                {selectedDb.waterNeed && <span style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontWeight:700,fontSize:11,padding:"3px 10px",borderRadius:999}}>{"💧 "+selectedDb.waterNeed}</span>}
              </div>
            </div>
          </div>
          <p style={{fontSize:14,color:T.text,lineHeight:1.65,marginBottom:20,fontWeight:500}}>{selectedDb.description}</p>
          <p style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px"}}>Water</p>
          <div style={{background:T.surface,borderRadius:16,padding:"12px 16px",marginBottom:16,boxShadow:T.shadow}}>
            <p style={{fontSize:13,color:T.text,lineHeight:1.55,margin:0,fontWeight:500}}>{selectedDb.waterAdvice}</p>
          </div>
          {selectedDb.feeding&&selectedDb.feeding.length>0&&(
            <div style={{marginBottom:16}}>
              <p style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,margin:"0 0 10px"}}>Voedingsadvies</p>
              {selectedDb.feeding.map(function(f, i) {
                return (
                  <div key={i} style={{background:T.surface,borderRadius:16,padding:"14px 16px",marginBottom:10,boxShadow:T.shadow,borderLeft:"4px solid "+selectedDb.accentColor}}>
                    <span style={{background:selectedDb.accentColor+"20",color:selectedDb.accentColor,fontWeight:800,fontSize:11,padding:"3px 10px",borderRadius:999,display:"inline-block",marginBottom:8}}>{f.period}</span>
                    <p style={{fontSize:15,fontWeight:800,color:T.text,margin:"0 0 3px"}}>{f.product}</p>
                    <p style={{fontSize:12,color:T.textMid,margin:"0 0 10px",fontWeight:500}}>NPK {f.npk} - {f.dose} - {f.freq}</p>
                    <SmallBtn href={f.link} style={{fontSize:12}}>Bestellen</SmallBtn>
                  </div>
                );
              })}
            </div>
          )}
          {selectedDb.tips&&selectedDb.tips.length>0&&(
            <div style={{background:T.surface,borderRadius:16,padding:"14px 16px",marginBottom:20,boxShadow:T.shadow}}>
              <p style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px"}}>Tips</p>
              {selectedDb.tips.map(function(tip, i) {
                return (
                  <div key={i} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:i<selectedDb.tips.length-1?"1.5px solid "+T.border:"none",alignItems:"flex-start"}}>

          {alInTuin ? (

          ) : (

              <p style={{fontSize:15,fontWeight:800,color:T.text,margin:"0 0 14px"}}>Toevoegen aan mijn tuin</p>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                {[{id:"pot",label:"In een pot"},{id:"grond",label:"Volle grond"}].map(function(opt){

              </div>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                {sizeOpts.map(function(opt){
                  return <button key={opt.id} onClick={function(){ setAddSize(opt.id); }} style={{flex:1,padding:"9px 4px",borderRadius:12,fontFamily:T.sans,fontWeight:800,fontSize:12,cursor:"pointer",background:addSize===opt.id?selectedDb.accentColor:T.bg,border:"2px solid "+(addSize===opt.id?selectedDb.accentColor:T.border),color:addSize===opt.id?"#fff":T.textMid,textAlign:"center"}}><div>{opt.label}</div><div style={{fontSize:10,fontWeight:600,opacity:0.8}}>{opt.sub}</div></button>;

    return (

        <input value={dbSearch} onChange={function(e){ setDbSearch(e.target.value); }} placeholder="Naam, Latijn, winterhardheid..." style={{width:"100%",background:T.surface,border:"2px solid "+T.border,borderRadius:14,color:T.text,fontFamily:T.sans,fontSize:14,padding:"12px 14px",outline:"none",marginBottom:10,boxShadow:T.shadow,boxSizing:"border-box"}} />

        <div style={{marginBottom:8,overflowX:"auto",scrollbarWidth:"none"}}>
          <div style={{display:"flex",gap:6,paddingBottom:4,minWidth:"max-content"}}>
            {CATS.map(function(c){ return <button key={c} onClick={function(){ setDbFilter(c); }} style={{padding:"6px 12px",borderRadius:999,border:"2px solid "+(dbFilter===c?T.green:T.border),background:dbFilter===c?T.green:T.surface,color:dbFilter===c?"#fff":T.textMid,fontFamily:T.sans,fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",textTransform:c==="alle"?undefined:"capitalize"}}>{c==="alle"?"Alle categorieën":c}</button>; })}
          </div>

        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:11,fontWeight:700,color:T.textMuted}}>Licht:</span>
            {LIGHT_FILTERS.map(function(l){ return <button key={l} onClick={function(){ setDbLightFilter(l); }} style={{padding:"4px 10px",borderRadius:999,border:"1.5px solid "+(dbLightFilter===l?T.amber:T.border),background:dbLightFilter===l?T.amberBg:"transparent",color:dbLightFilter===l?T.amber:T.textMuted,fontFamily:T.sans,fontWeight:700,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>{l==="alle"?"Alle":l}</button>; })}
          </div>
          <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:11,fontWeight:700,color:T.textMuted}}>Water:</span>
            {WATER_FILTERS.map(function(w){ return <button key={w} onClick={function(){ setDbWaterFilter(w); }} style={{padding:"4px 10px",borderRadius:999,border:"1.5px solid "+(dbWaterFilter===w?"#4A90D9":T.border),background:dbWaterFilter===w?"#EAF3FF":"transparent",color:dbWaterFilter===w?"#2A6AB0":T.textMuted,fontFamily:T.sans,fontWeight:700,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>{w==="alle"?"Alle":w}</button>; })}

        </div>

        {filtered.length===0 ? (
          <div style={{textAlign:"center",padding:"30px 0 10px",color:T.textMuted}}>
            <p style={{fontSize:28,marginBottom:8}}>🔍</p>
            <p style={{fontSize:15,fontWeight:800,color:T.text,marginBottom:4}}>Niet gevonden</p>
            <p style={{fontSize:12,marginBottom:20}}>Probeer een andere zoekterm of filter</p>
            <MissingPlantForm dbSearch={dbSearch} T={T} userName={userName} />
          </div>
        ) : (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(152px,1fr))",gap:11}}>
            {filtered.map(function(p) {
              var inGarden = myPlants.find(function(mp){ return mp.dbId===p.id || mp.id===p.id.replace("db-",""); });
              return (
                <div key={p.id} style={{borderRadius:16,overflow:"hidden",cursor:"pointer",boxShadow:T.shadow,background:T.surface}} onClick={function(){ setSelectedDb(p); }}>
                  <div style={{height:90,background:"linear-gradient(135deg,"+p.accentColor+"DD,"+p.accentColor+"88)",position:"relative"}}>
                    <div style={{position:"absolute",inset:0,opacity:0.07,backgroundImage:"radial-gradient(circle,#fff 1px,transparent 1px)",backgroundSize:"16px 16px"}} />
                    {inGarden && <div style={{position:"absolute",top:6,right:6,background:"rgba(255,255,255,0.25)",borderRadius:999,padding:"2px 7px",fontSize:9,fontWeight:800,color:"#fff"}}>In tuin</div>}
                    {p.toxic && <div style={{position:"absolute",top:6,left:6,background:"rgba(184,90,58,0.85)",borderRadius:999,padding:"2px 7px",fontSize:9,fontWeight:800,color:"#fff"}}>Giftig</div>}
                    <div style={{position:"absolute",bottom:5,left:7,right:7,display:"flex",gap:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.9)",background:"rgba(0,0,0,0.3)",padding:"2px 6px",borderRadius:999}}>{p.category}</span>
                      {p.waterNeed && <span style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.9)",background:"rgba(0,0,0,0.3)",padding:"2px 6px",borderRadius:999}}>{"💧"+p.waterNeed}</span>}
                    </div>
                  </div>
                  <div style={{padding:"8px 10px"}}>
                    <p style={{fontSize:12,fontWeight:800,color:T.text,margin:"0 0 2px",lineHeight:1.2}}>{p.name}</p>
                    <p style={{fontSize:9,color:T.textMuted,margin:"0 0 5px",fontStyle:"italic",lineHeight:1.3}}>{p.latin}</p>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:9,fontWeight:700,color:p.accentColor,background:p.accentColor+"18",padding:"2px 6px",borderRadius:999}}>{"❄ "+p.winterHardy}</span>
                    </div>
                  </div>
                </div>

          </div>
        )}
      </div>
    );

  // ── WEKKER ─────────────────────────────────────────────────────────────────────
  function MeldingenScreen() {
    var DAGEN  = ["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"];
    var DKORT  = ["Zo","Ma","Di","Wo","Do","Vr","Za"];
    var ALARM_TYPES = [
      {id:"water",   label:"Water geven",   icon:"💧", color:"#4A90D9"},
      {id:"voeding", label:"Voeding geven", icon:"🌿", color:T.green},
    ];
    var [editing,  setEditing]  = React.useState(null);
    var [editDay,  setEditDay]  = React.useState(0);
    var [editHour, setEditHour] = React.useState(8);
    var [editMin,  setEditMin]  = React.useState(0);
    var [justSet,  setJustSet]  = React.useState(null);

    function openEdit(plant, type) {
      var rkey = plant.id+"-"+type.id;
      var ex = reminders[rkey];
      setEditDay(ex?ex.day:0); setEditHour(ex?ex.hour:8); setEditMin(ex?ex.minute:0);
      setEditing({rkey:rkey, plantId:plant.id, plantName:plant.shortName, typeLabel:type.label, typeIcon:type.icon, typeColor:type.color, accent:plant.accentColor});
      setJustSet(null);
    }

    function handleSave(withAlarm) {
      if (!editing) return;
      saveReminder(editing.rkey, {day:editDay, hour:editHour, minute:editMin});
      if (withAlarm) {
        var detail = {hour:editHour, minute:editMin, day:editDay, message:editing.typeLabel+" - "+editing.plantName};
        setPendingAlarm(detail);
        window.dispatchEvent(new CustomEvent("plantkeeper-alarm", {detail:detail}));
        setJustSet(Object.assign({},editing,{day:editDay,hour:editHour,minute:editMin}));
      }
      setEditing(null);
    }

    return (
      <div style={{maxWidth:680,margin:"0 auto",padding:"20px 16px 100px"}}>
        <h1 style={{fontSize:26,fontWeight:900,color:T.text,margin:"0 0 4px"}}>Wekkers</h1>
        <p style={{fontSize:13,color:T.textMid,fontWeight:500,marginBottom:20,lineHeight:1.5}}>Stel per plant een wekker in voor water en voeding. Herhaalt wekelijks.</p>

        {justSet && (
          <div style={{background:T.greenLight,border:"2px solid "+T.green+"40",borderRadius:14,padding:"12px 16px",marginBottom:18,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>⏰</span>
            <div>
              <p style={{fontSize:13,fontWeight:800,color:T.green,margin:0}}>Wekker ingesteld!</p>
              <p style={{fontSize:11,color:T.textMid,margin:"2px 0 0"}}>{justSet.typeLabel} - {justSet.plantName} - elke {DAGEN[justSet.day]} om {String(justSet.hour).padStart(2,"0")}:{String(justSet.minute).padStart(2,"0")}</p>
            </div>
          </div>
        )}

        {myPlants.map(function(plant) {
          return (
            <div key={plant.id} style={{background:T.surface,borderRadius:18,marginBottom:14,boxShadow:T.shadow,overflow:"hidden",borderTop:"4px solid "+plant.accentColor}}>
              <div style={{padding:"12px 16px 6px"}}>
                <p style={{fontSize:14,fontWeight:900,color:T.text,margin:"0 0 1px"}}>{plant.shortName}</p>
                <p style={{fontSize:11,color:T.textMuted,margin:0,fontWeight:600}}>{plant.location}</p>
              </div>
              {ALARM_TYPES.map(function(type) {
                var rkey = plant.id+"-"+type.id;
                var rem = reminders[rkey];
                return (
                  <div key={type.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",borderTop:"1px solid "+T.border}}>
                    <div style={{width:36,height:36,borderRadius:11,background:type.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{type.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:13,fontWeight:800,color:T.text,margin:0}}>{type.label}</p>
                      {rem
                        ? <p style={{fontSize:11,color:T.green,fontWeight:700,margin:"2px 0 0"}}>Elke {DAGEN[rem.day]} - {String(rem.hour).padStart(2,"0")}:{String(rem.minute).padStart(2,"0")}</p>
                        : <p style={{fontSize:11,color:T.textMuted,margin:"2px 0 0"}}>Geen wekker</p>
                      }
                    </div>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      {rem && <button onClick={function(){ saveReminder(rkey,null); }} style={{width:27,height:27,borderRadius:8,background:T.rustBg,border:"none",color:T.rust,cursor:"pointer",fontWeight:900,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>}
                      <button onClick={function(){ openEdit(plant,type); }} style={{padding:"6px 12px",borderRadius:10,fontFamily:T.sans,fontWeight:800,fontSize:12,cursor:"pointer",background:rem?T.greenLight:plant.accentColor+"18",border:"2px solid "+(rem?T.green:plant.accentColor)+"44",color:rem?T.green:plant.accentColor}}>{rem?"Wijzig":"Instellen"}</button>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}

        {editing && (
          <div style={{position:"fixed",inset:0,background:"rgba(26,46,26,0.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
            <div style={{background:T.surface,borderRadius:"22px 22px 0 0",padding:"18px 18px 38px",width:"100%",maxWidth:500,boxShadow:"0 -8px 40px rgba(26,46,26,0.2)"}}>
